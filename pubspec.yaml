name: mediscan
description: Medicine Scanner & AI Information System
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase — REALTIME DATABASE (not Firestore)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_database: ^11.1.4

  # State
  provider: ^6.1.2

  # ML Kit OCR
  google_mlkit_text_recognition: ^0.13.0

  # Gemini AI
  google_generative_ai: ^0.4.6

  # Camera & Images
  camera: ^0.10.5+9
  image_picker: ^1.1.2

  # Storage
  sqflite: ^2.3.2
  path: ^1.9.0
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3

  # Network
  http: ^1.2.0

  # Auth
  google_sign_in: ^6.2.1

  # UI & Utils
  google_fonts: ^6.2.1
  share_plus: ^10.1.4
  permission_handler: ^11.3.1
  flutter_dotenv: ^5.1.0
  url_launcher: ^6.2.0
  intl: ^0.20.2
  firebase_crashlytics: ^4.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/database/
    - assets/translations/
    - assets/fonts/

  fonts:
    - family: NotoNastaliqUrdu
      fonts:
        - asset: assets/fonts/NotoNastaliqUrdu-Regular.ttf
